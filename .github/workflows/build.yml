name: build

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  linux:
    # CI sanity check that the project still configures + builds against
    # the older Qt 6.2 on Ubuntu 22.04. Windows is the primary target.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 + build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            qt6-base-dev qt6-multimedia-dev qt6-tools-dev qt6-tools-dev-tools \
            qt6-webengine-dev qt6-webengine-dev-tools \
            cmake ninja-build g++ libgl-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Smoke test (offscreen)
        run: |
          QT_QPA_PLATFORM=offscreen timeout 3 ./build/volchay-obs || true

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6.7
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtmultimedia qtwebengine qtwebchannel qtpositioning'
          cache: true

      - name: Configure (MSVC x64)
        shell: cmd
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 ^
                -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: cmd
        run: cmake --build build --config Release --parallel

      - name: Stage Windows package (windeployqt)
        shell: pwsh
        run: |
          $stage = "stage/VolchayObs"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item "build/Release/VolchayObs.exe" $stage

          $qtRoot = $env:QT_ROOT_DIR
          if (-not $qtRoot) { $qtRoot = $env:IQTA_QT_DIR }
          if (-not $qtRoot) {
            $qtRoot = Resolve-Path (Join-Path $env:Qt6_DIR '..\..\..')
          }
          $deploy = Join-Path $qtRoot 'bin\windeployqt.exe'
          Write-Host "Using windeployqt at: $deploy"
          & $deploy `
              --release --no-translations --no-system-d3d-compiler `
              --no-opengl-sw --no-quick-import `
              "$stage/VolchayObs.exe"
          Get-ChildItem $stage -Recurse | Select-Object FullName, Length

      - name: Download ffmpeg
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $exe = Get-ChildItem ffmpeg_tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $exe.FullName "stage/VolchayObs/ffmpeg.exe"

      - name: Create zip
        shell: pwsh
        run: |
          $zip = "VolchayObs-windows-x64.zip"
          if (Test-Path $zip) { Remove-Item $zip }
          Compress-Archive -Path "stage/VolchayObs/*" -DestinationPath $zip
          Get-Item $zip | Select-Object FullName, Length

      - name: Upload artifact (per-commit)
        uses: actions/upload-artifact@v4
        with:
          name: VolchayObs-windows-x64-${{ github.sha }}
          path: VolchayObs-windows-x64.zip
          if-no-files-found: error

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: VolchayObs-windows-x64.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
