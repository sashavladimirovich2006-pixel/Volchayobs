<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A1A1A"/>
      <stop offset="1" stop-color="#0A0A0A"/>
    </linearGradient>
    <radialGradient id="bloom" cx="128" cy="128" r="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF3344" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FF3344" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dot" cx="128" cy="128" r="22" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF4D60"/>
      <stop offset="1" stop-color="#D62235"/>
    </radialGradient>
  </defs>

  <!-- Rounded backdrop with subtle red bloom behind the LIVE dot. -->
  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#bg)"/>
  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#bloom)"/>

  <!-- Three concentric radio waves expanding to the right. The arc
       opening angles widen as they move outward so the icon reads as
       "broadcast" from any size, including 16×16. -->
  <g stroke="#FF3344" stroke-linecap="round" fill="none">
    <path d="M 152 92 A 50 50 0 0 1 152 164" stroke-width="10" stroke-opacity="0.95"/>
    <path d="M 172 70 A 80 80 0 0 1 172 186" stroke-width="10" stroke-opacity="0.7"/>
    <path d="M 192 48 A 110 110 0 0 1 192 208" stroke-width="10" stroke-opacity="0.45"/>
  </g>

  <!-- Central LIVE indicator dot. -->
  <circle cx="128" cy="128" r="22" fill="url(#dot)"/>
  <circle cx="128" cy="128" r="22" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.18"/>
</svg>
